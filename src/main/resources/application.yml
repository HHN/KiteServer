app:
  internal:
    api:
      key: ${APP_INTERNAL_API_KEY}

server:
  error:
    include-message: always
    include-binding-errors: always
  port: 8080
  ssl:
    enabled: false

  tomcat:
    accesslog:
      enabled: true
      directory: logs
      prefix: access_log
      suffix: .log
      file-date-format: .yyyy-MM-dd

spring:
  datasource:
    password: password
    url: jdbc:postgresql://localhost:5432/registration?charSet=UTF8
    username: postgres
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        connection:
          charSet: UTF-8
    show-sql: true

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
  file:
    path: ./log

management:
  endpoints:
    web:
      exposure:
        include: "health,info"

openai:
  enabled: true   # kill-switch: set to false to block outbound OpenAI calls immediately
  api:
    key: ${OPENAI_API_KEY}         # kommt aus .env
  model: ${OPENAI_MODEL:gpt-4o}    # Fallback, falls nicht in .env
  temperature: ${OPENAI_TEMPERATURE:0.5}
  max-tokens: ${OPENAI_MAX_TOKENS:2000}

# Resilience4j Circuit Breaker Configuration:
# This mechanism protects the application from cascading failures. 
# It monitors the last 10 requests and "opens" the circuit (stops calls to OpenAI) 
# if the failure rate reaches 50%. After a 2-minute wait, it attempts recovery 
# by allowing 3 trial calls (half-open state).
resilience4j:
  circuitbreaker:
    instances:
      openai:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 2m
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

security:
  api:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  kite:
    hmac-secret: ${KITE_HMAC_SECRET}
    passphrase: ${KITE_PASSPHRASE:}

# Bucket4j Rate Limiting Configuration:
# This setup protects your API endpoints from abuse and brute-force attacks.
# It uses two different filters:
# 1. Metrics Filter: Limits requests to /metrics endpoints to 30 per minute per IP address.
# 2. AI Filter: A stricter limit for /ai POST requests, allowing only 5 attempts per 10 minutes, 
# tracked by a combination of IP address and Session ID.
# The 'greedy' refill strategy ensures tokens are restored gradually over time.
bucket4j:
  enabled: true
  filters:
    - cache-name: buckets
      filter-method: auto
      filter-order: 1
      url: /metrics/(playthroughs/hit|scenes/.*/hit)
      strategy: first
      rate-limits:
        - expression: "getRemoteAddr()"
          bandwidths:
            - capacity: 30
              time: 1
              unit: minutes
              refill-strategy: greedy
    - cache-name: buckets
      filter-order: 2
      url: /ai
      http-methods:
        - POST
      rate-limits:
        - cache-key: "getRemoteAddr() + '-' + getSession().getId()"
          bandwidths:
            - capacity: 5
              time: 10
              unit: minutes
              refill-strategy: greedy