server:
  error:
    include-message: always
    include-binding-errors: always
  port: 443
  ssl:
    key-alias: kite2
    key-store: classpath:keystore/keystore.p12
    key-store-type: PKCS12
    key-store-password: REDACTED_PASSWORD
spring:
  datasource:
    password: password
    url: jdbc:postgresql://localhost:5432/registration?charSet=UTF8
    username: postgres
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        connection:
          charSet: UTF-8
    show-sql: true
  mail:
    host: "mail.gmx.net"
    port: 587
    username: "mergos123@gmx.de"
    password: "123456789abc1!!!!"
    protocol: "smtp"
    properties:
      mail:
        smtp:
          ssl:
            trust: "*"
          auth: true
          starttls:
            enable: true
          connectiontimeout: 15000
          timeout: 3000
          writetimeout: 15000
logging:
  level:
    root: ERROR
  file:
    path: ./log