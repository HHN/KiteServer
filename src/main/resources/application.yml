server:
  error:
    include-message: always
    include-binding-errors: always
  port: 8080
  ssl:
    enabled: false

  tomcat:
    accesslog:
      enabled: true
      directory: logs
      prefix: access_log
      suffix: .log
      file-date-format: .yyyy-MM-dd

spring:
  datasource:
    password: password
    url: jdbc:postgresql://localhost:5432/registration?charSet=UTF8
    username: postgres
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        connection:
          charSet: UTF-8
    show-sql: true

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
  file:
    path: ./log

management:
  endpoints:
    web:
      exposure:
        include: "*"

openai:
  enabled: true   # kill-switch: set to false to block outbound OpenAI calls immediately
  api:
    key: ${OPENAI_API_KEY}         # kommt aus .env
  model: ${OPENAI_MODEL:gpt-4o}    # Fallback, falls nicht in .env
  temperature: ${OPENAI_TEMPERATURE:0.5}
  max-tokens: ${OPENAI_MAX_TOKENS:2000}

resilience4j:
  circuitbreaker:
    instances:
      openai:
        registerHealthIndicator: true
        slidingWindowSize: 10        # View the last 10 requests
        failureRateThreshold: 50     # If 50% of them fail, kill switch ON
        waitDurationInOpenState: 2m  # Wait 2 minutes before we automatically try again
        permittedNumberOfCallsInHalfOpenState: 3 # Allow 3 test requests during restart
        automaticTransitionFromOpenToHalfOpenEnabled: true

security:
  api:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}

bucket4j:
  enabled: true
  filters:
    - cache-name: buckets
      filter-method: auto
      filter-order: 1
      url: /metrics/(playthroughs/hit|scenes/.*/hit)
      strategy: first
      rate-limits:
        - expression: "getRemoteAddr()"
          bandwidths:
            - capacity: 30
              time: 1
              unit: minutes
              refill-strategy: greedy
    - cache-name: buckets
      filter-order: 2
      url: /ai
      http-methods:
        - POST
      rate-limits:
        - cache-key: "getRemoteAddr() + '-' + getSession().getId()"
          bandwidths:
            - capacity: 5
              time: 10
              unit: minutes
              refill-strategy: greedy