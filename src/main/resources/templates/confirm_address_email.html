<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #333;
            padding: 20px;
        }

        .content {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #ddd;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="content">
    <h2>Willkommen!</h2>
    <p>Danke für deine Registrierung bei Kite II.</p>
    <p>Bitte klicke auf den folgenden Button, um deine E-Mail-Adresse zu bestätigen:</p>
    <a href="{link}" class="button">E-Mail bestätigen</a>
    <p>Wenn du die Registrierung nicht angefordert hast, ignoriere bitte diese E-Mail.</p>
</div>

</body>
</html>
